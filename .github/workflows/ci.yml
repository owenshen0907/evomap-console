name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  audit-and-build:
    name: Audit and Build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run open-source audit
        run: ./scripts/open_source_audit.sh

      - name: Build macOS app
        run: xcodebuild -project EvomapConsole.xcodeproj -scheme EvomapConsole -configuration Debug build
