name: Bug report
description: Report a reproducible bug in EvoMap Console
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real API keys, node secrets, claim URLs, or account data.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.1.0 / commit SHA"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Nodes
        - Skills
        - Services
        - Orders
        - Credits
        - Graph
        - Settings
        - Build / install
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
