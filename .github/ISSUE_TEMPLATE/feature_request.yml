name: Feature request
description: Suggest an improvement for EvoMap Console
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is currently painful or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior and affected screen.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Nodes
        - Skills
        - Services
        - Orders
        - Credits
        - Graph
        - Settings
        - Documentation
        - Other
    validations:
      required: true
